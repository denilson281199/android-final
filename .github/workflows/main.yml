name: Build APK
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Build with Buildozer
        uses: artemserebriakov/buildozer-action@v1.4.1
        with:
          buildozer_version: master
          command: buildozer android debug
